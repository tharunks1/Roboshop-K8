apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
data:
  MONGO: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    app: catalogue
    tier: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogue
      tier: app
  template:
    metadata:
      labels:
        app: catalogue
        tier: app
    spec:
      containers:
      - name: catalogue
        image: dockerhk2/catalogue:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: catalogue

---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
spec:
  selector:
    app: catalogue
    tier: app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

